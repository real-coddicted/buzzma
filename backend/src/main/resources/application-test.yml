spring:
  datasource:
    url: ${DB_URL:}
    username: ${DB_USERNAME:}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver
    hikari:
      data-source-properties: {}
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    baseline-on-migrate: false
    baseline-version: 1
    user: ${FLYWAY_MIGRATOR_USER:}
    password: ${FLYWAY_MIGRATOR_PASSWORD:}
  servlet:
    multipart:
      max-file-size: 10MB
  app:
    gemini:
      api-key: ${GEMINI_API_KEY:}
      model: ${GEMINI_MODEL:gemini-2.0-flash}

app:
  turnstile:
    enabled: ${TURNSTILE_ENABLED:false}
  seed:
    initial-user: ${SEED_DATA:false}

logging:
  level:
    com.coddicted.buzzma.shared.web.com.coddicted.buzzma.config.RequestLoggingFilter: DEBUG