spring:
  datasource:
    url: ${DB_URL:}
    username: ${DB_USERNAME:}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver
    hikari:
      data-source-properties:
        stringtype: unspecified
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration,classpath:db/vendor/{vendor}
    user: ${FLYWAY_MIGRATOR_USER:}
    password: ${FLYWAY_MIGRATOR_PASSWORD:}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
  servlet:
    multipart:
      max-file-size: 10MB

server:
  port: ${PORT:8080}

app:
  seed:
    initial-user: ${SEED_DATA:false}
    name: ${SEED_DATA_USER:}
    mobile: ${SEED_DATA_MOBILE:}
    password: ${SEED_DATA_PASSWORD:}
  gemini:
    api-key: ${GEMINI_API_KEY:}
    model: ${GEMINI_MODEL:gemini-2.5-flash}
  turnstile:
    enabled: ${TURNSTILE_ENABLED:true}
    secret-key: ${TURNSTILE_SECRET_KEY:}
  jwt:
    access-secret: ${JWT_ACCESS_SECRET:change-me-access-secret-min-32-chars!!}
    refresh-secret: ${JWT_REFRESH_SECRET:change-me-refresh-secret-min-32-chars!!}
    access-expiry-ms: ${JWT_ACCESS_EXPIRY_MS:900000}
    refresh-expiry-ms: ${JWT_REFRESH_EXPIRY_MS:604800000}
  cookie:
    secure: ${COOKIE_SECURE:true}
  rate-limit:
    auth:
      capacity: ${RATE_LIMIT_AUTH_CAPACITY:10}
      refill-tokens: ${RATE_LIMIT_AUTH_REFILL_TOKENS:10}
      refill-period: ${RATE_LIMIT_AUTH_REFILL_PERIOD:PT1M}
      expire-after-access: ${RATE_LIMIT_AUTH_EXPIRE_AFTER_ACCESS:PT5M}
    user:
      capacity: ${RATE_LIMIT_USER_CAPACITY:10}
      refill-tokens: ${RATE_LIMIT_USER_REFILL_TOKENS:10}
      refill-period: ${RATE_LIMIT_USER_REFILL_PERIOD:PT1S}
      expire-after-access: ${RATE_LIMIT_USER_EXPIRE_AFTER_ACCESS:PT1H}
  cooling-settler:
    interval-ms: ${COOLING_SETTLER_INTERVAL_MS:3600000}
  wallet:
    max-balance-paise: ${WALLET_MAX_BALANCE_PAISE:100000000}
  score:
    base-url: ${SCORE_BASE_URL:http://localhost:8082}
  extraction:
    scheduler:
      fixed-delay-ms: ${EXTRACTION_SCHEDULER_DELAY_MS:30000}
      batch-size: ${EXTRACTION_SCHEDULER_BATCH_SIZE:5}
      thread-pool-size: ${EXTRACTION_SCHEDULER_THREAD_POOL_SIZE:5}
  scoring:
    scheduler:
      fixed-delay-ms: ${SCORING_SCHEDULER_DELAY_MS:30000}
      batch-size: ${SCORING_SCHEDULER_BATCH_SIZE:5}
      thread-pool-size: ${SCORING_SCHEDULER_THREAD_POOL_SIZE:5}
  storage:
    type: ${STORAGE_TYPE:garage}
    base-dir: ${STORAGE_BASE_DIR:./storage}
    s3:
      endpoint: ${S3_ENDPOINT:}
      bucket: ${S3_BUCKET:buzzma-test}
      access-key: ${S3_ACCESS_KEY:}
      secret-key: ${S3_SECRET_KEY:}
      region: ${S3_REGION:garage}

logging:
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %-5p ${PID:- } --- [%15.15t] %-40.40logger{39}:%line : %m%n%wEx"
  level:
    com.coddicted.buzzma.shared.web.com.coddicted.buzzma.config.RequestLoggingFilter: DEBUG



