spring:
  datasource:
    url: ${DB_URL:}
    username: ${DB_USERNAME:}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver
    hikari:
      data-source-properties:
        stringtype: unspecified
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
  servlet:
    multipart:
      max-file-size: 10MB

server:
  port: ${PORT:8080}

app:
  gemini:
    api-key: ${GEMINI_API_KEY:}
    model: ${GEMINI_MODEL:gemini-2.5-flash}
  turnstile:
    enabled: ${TURNSTILE_ENABLED:true}
    secret-key: ${TURNSTILE_SECRET_KEY:}
  jwt:
    access-secret: ${JWT_ACCESS_SECRET:change-me-access-secret-min-32-chars!!}
    refresh-secret: ${JWT_REFRESH_SECRET:change-me-refresh-secret-min-32-chars!!}
    access-expiry-ms: ${JWT_ACCESS_EXPIRY_MS:900000}
    refresh-expiry-ms: ${JWT_REFRESH_EXPIRY_MS:604800000}
  cooling-settler:
    interval-ms: ${COOLING_SETTLER_INTERVAL_MS:3600000}
  wallet:
    max-balance-paise: ${WALLET_MAX_BALANCE_PAISE:100000000}
  storage:
    type: ${STORAGE_TYPE:garage}
    base-dir: ${STORAGE_BASE_DIR:./storage}
    s3:
      endpoint: ${S3_ENDPOINT:}
      bucket: ${S3_BUCKET:buzzma-test}
      access-key: ${S3_ACCESS_KEY:}
      secret-key: ${S3_SECRET_KEY:}
      region: ${S3_REGION:garage}

logging:
  level:
    com.coddicted.buzzma.shared.web.com.coddicted.buzzma.config.RequestLoggingFilter: DEBUG

