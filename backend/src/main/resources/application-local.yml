spring:
  datasource:
    url: jdbc:h2:file:~/buzzmah-db;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password:
    driver-class-name: org.h2.Driver
    hikari:
      data-source-properties: {}
  h2:
    console:
      enabled: true
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  flyway:
    baseline-on-migrate: false
    baseline-version: 1
    user: sa
    password:
  servlet:
    multipart:
      max-file-size: 10MB
  app:
    gemini:
      api-key: ${GEMINI_API_KEY:}
      model: ${GEMINI_MODEL:gemini-2.0-flash}

app:
  turnstile:
    enabled: ${TURNSTILE_ENABLED:false}
  seed:
    initial-user: true
    name: Test Admin 1
    mobile: "9000000001"
    password: test1234

logging:
  level:
    com.coddicted.buzzma.shared.web.com.coddicted.buzzma.config.RequestLoggingFilter: DEBUG