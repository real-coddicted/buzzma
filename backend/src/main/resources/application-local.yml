#      data-source-properties: {}
#  h2:
#    console:
#      enabled: true
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/buzzma}
    username: ${DB_USERNAME:buzzma}
    password: ${DB_PASSWORD:buzzma}
    driver-class-name: org.postgresql.Driver
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
#  flyway:
#    baseline-on-migrate: false
#    baseline-version: 1
#    user: sa
#    password:
  flyway:
    baseline-on-migrate: false
    baseline-version: 1
    user: ${FLYWAY_MIGRATOR_USER:${spring.datasource.username}}
    password: ${FLYWAY_MIGRATOR_PASSWORD:${spring.datasource.password}}
    placeholders:
      appRuntimeRole: ""
      flywayMigratorRole: ""
  servlet:
    multipart:
      max-file-size: 10MB
  app:
    gemini:
      api-key: ${GEMINI_API_KEY:}
      model: ${GEMINI_MODEL:gemini-2.0-flash}

app:
  turnstile:
    enabled: ${TURNSTILE_ENABLED:false}
  seed:
    initial-user: true
    name: Test Admin 1
    mobile: "9000000001"
    password: test1234
  rate-limit:
    auth:
      capacity: ${RATE_LIMIT_AUTH_CAPACITY:100}
      refill-tokens: ${RATE_LIMIT_AUTH_REFILL_TOKENS:100}
      refill-period: ${RATE_LIMIT_AUTH_REFILL_PERIOD:PT1M}
      expire-after-access: ${RATE_LIMIT_AUTH_EXPIRE_AFTER_ACCESS:PT5M}
    user:
      capacity: ${RATE_LIMIT_USER_CAPACITY:100}
      refill-tokens: ${RATE_LIMIT_USER_REFILL_TOKENS:100}
      refill-period: ${RATE_LIMIT_USER_REFILL_PERIOD:PT1S}
      expire-after-access: ${RATE_LIMIT_USER_EXPIRE_AFTER_ACCESS:PT1H}

logging:
  level:
    com.coddicted.buzzma.shared.web.com.coddicted.buzzma.config.RequestLoggingFilter: DEBUG