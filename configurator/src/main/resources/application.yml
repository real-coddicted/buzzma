spring:
  application:
    name: buzzma-configurator
  datasource:
    url: ${DB_URL:}
    username: ${DB_USERNAME:}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    # common/ applies to every environment; the env-specific folder is resolved
    # from CONFIGURATOR_ENV at runtime (dev | staging | prod).
    locations:
      - classpath:db/migrations/common
      - classpath:db/migrations/${CONFIGURATOR_ENV:local}
    # Separate history table from backend's flyway_schema_history.
    table: flyway_schema_history_configurator
    user: ${FLYWAY_MIGRATOR_USER:}
    password: ${FLYWAY_MIGRATOR_PASSWORD:}

  security:
    user:
      name: ${ADMIN_USERNAME:admin}
      password: ${ADMIN_PASSWORD:}

server:
  port: ${PORT:8084}

configurator:
  poll-interval-seconds: ${POLL_INTERVAL_SECONDS:45}
  bulk-fetch-cache-ttl-seconds: 5

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %-5p ${PID:- } --- [%15.15t] %-40.40logger{39}:%line : %m%n%wEx"
  level:
    com.coddicted.buzzma.configurator: INFO
