services:
  notifications:
    image: gitea.local.coddicted.com/coddicted/buzzma-notifications:latest
    container_name: buzzma-notifications
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:8081/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  backend:
    image: gitea.local.coddicted.com/coddicted/buzzma-backend:latest
    container_name: buzzma-backend
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      notifications:
        condition: service_healthy
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:8080/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  frontend:
    image: gitea.local.coddicted.com/coddicted/buzzma-frontend:latest
    container_name: buzzma-frontend
    env_file: .env
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:80"