name: Build, Test, and Publish Notification Docker Image

on:
  push:
    branches: ["**"]
    tags: ["v*.*.*"]

env:
  REGISTRY: gitea.local.coddicted.com
  IMAGE_NAME: ${{ gitea.repository_owner }}/${{ github.event.repository.name }}-notification

jobs:
  notification:
    name: Build and Push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      # ⚡ CRITICAL: Build the JAR here so Docker doesn't have to re-compile
      - name: Build with Gradle
        # 'bootJar' creates the executable JAR, '-x test' skips tests since you run them separately
        run: ./gradlew bootJar -x test --no-daemon
        working-directory: notifications

      - name: Run tests
        run: ./gradlew test --no-daemon
        working-directory: notifications

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=ref,event=branch,suffix=-beta,enable=${{ github.ref != 'refs/heads/main' && !startsWith(github.ref, 'refs/tags/') }}
            type=semver,pattern={{version}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./notifications
          file: ./notifications/Dockerfile
          # ⚡ OPTIMIZATION: Only do multi-arch on main/tags to save 20+ mins
          platforms: ${{ (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')) && 'linux/amd64,linux/arm64' || 'linux/amd64' }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # ⚡ OPTIMIZATION: Enable GitHub Actions native caching
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false